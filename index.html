<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Just Dental Clinic Chat</title>
    <style>
      body { font-family: system-ui, Arial; margin: 0; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
      .box { border: 1px solid #e5e7eb; border-radius: 12px; height: 70vh; padding: 12px; overflow: auto; background: #fff; }
      .msg { margin: 10px 0; }
      .user { font-weight: 600; }
      .assistant { font-weight: 600; }
      form { display: flex; gap: 8px; margin-top: 12px; }
      input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #e5e7eb; }
      button { padding: 10px 12px; border-radius: 10px; border: 1px solid #e5e7eb; background: #111827; color: white; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Just Dental Clinic</h2>
      <div id="chat" class="box"></div>

      <form id="form">
        <input id="input" placeholder="Type your message…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </div>

    <script>
      const WORKER_URL = "YOUR_WORKER_URL";
      const chatBox = document.getElementById("chat");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      let previousChatId = null;

      function add(role, text) {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span class="${role}">${role}:</span> ${text.replaceAll("\n","<br/>")}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      add("assistant", "Hi! How can I help you today—booking, rescheduling, or a question?");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        input.value = "";

        add("user", text);

        const resp = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: text, previousChatId }),
        });

        const data = await resp.json();
        previousChatId = data.id;

        const out = (data.output || []).map(m => m.content).join("\n");
        add("assistant", out || "(no response)");
      });
    </script>
  </body>
</html>
